apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  namespace: extraquiz
  labels:
  labels:
    app: streamlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers:
        - name: streamlit
          # Update to your Artifact Registry image.
          image: gcr.io/mcppp/streamlit:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MCP_CLIENT_API_URL
              value: "http://mcp-host:8000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
