apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-host
  namespace: extraquiz
  labels:
    app: mcp-host
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-host
  template:
    metadata:
      labels:
        app: mcp-host
    spec:
      containers:
        - name: mcp-host
          # Need to be updated
          image: gcr.io/mcppp/mcp-host:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MCP_TOOL_URL
              value: "http://mcp-server:9000/mcp"
            - name: GEMINI_MODEL
              value: "gemini-3-flash-preview"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: GOOGLE_API_KEY
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /ok
              port: 8000
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ok
              port: 8000
            initialDelaySeconds: 25
            periodSeconds: 20
